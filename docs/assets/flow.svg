<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 420" role="img" aria-label="ConverToe conversion flow">
  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8fb8bf"/>
    </marker>
    <marker id="errorArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff8a80"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#0f1115"/>

  <g font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="700" text-anchor="middle">
    <rect x="320" y="20" width="260" height="48" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="450" y="49" fill="#e4f8f9">Open app</text>

    <rect x="320" y="88" width="260" height="48" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="450" y="117" fill="#e4f8f9">Select or drop media</text>

    <rect x="345" y="160" width="210" height="62" rx="10" fill="#4f411d" stroke="#d5a93f" transform="rotate(45 450 191)"/>
    <text x="450" y="187" fill="#fff2c5">Supported type?</text>

    <rect x="320" y="240" width="260" height="48" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="450" y="269" fill="#e4f8f9">Choose output format</text>

    <rect x="320" y="308" width="260" height="48" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="450" y="337" fill="#e4f8f9">Choose output folder</text>

    <rect x="320" y="376" width="260" height="48" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="450" y="405" fill="#e4f8f9">Run conversion worker</text>

    <rect x="610" y="158" width="220" height="54" rx="10" fill="#4a2323" stroke="#ff8a80"/>
    <text x="720" y="188" fill="#ffe8e5">Show error message</text>

    <rect x="610" y="308" width="220" height="54" rx="10" fill="#18373a" stroke="#3a7b80"/>
    <text x="720" y="338" fill="#e4f8f9">Write output file</text>
  </g>

  <g fill="none" stroke-width="2.4" marker-end="url(#flowArrow)">
    <path d="M450 68 V88" stroke="#8fb8bf"/>
    <path d="M450 136 V162" stroke="#8fb8bf"/>
    <path d="M450 222 V240" stroke="#8fb8bf"/>
    <path d="M450 288 V308" stroke="#8fb8bf"/>
    <path d="M450 356 V376" stroke="#8fb8bf"/>
    <path d="M561 191 H610" stroke="#ff8a80" marker-end="url(#errorArrow)"/>
    <path d="M450 191 H610" stroke="#8fb8bf" marker-end="url(#flowArrow)"/>
    <path d="M720 212 V308" stroke="#8fb8bf" marker-end="url(#flowArrow)"/>
  </g>

  <g font-family="system-ui, -apple-system, monospace" font-size="12" fill="#9aa3b2" font-weight="700">
    <text x="582" y="186">No</text>
    <text x="580" y="175">Yes</text>
    <text x="640" y="289">Error path</text>
    <text x="476" y="234">Happy path</text>
  </g>
</svg>