<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 900 500" role="img" aria-label="ConverToe architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#0f1115"/>

  <g font-family="system-ui, -apple-system, monospace" font-size="14" fill="#d9e1f2">
    <rect x="26" y="24" width="848" height="188" rx="16" fill="none" stroke="#35568d" stroke-dasharray="8 6"/>
    <text x="42" y="46" fill="#8fb0ff" font-weight="700">Desktop app</text>

    <rect x="26" y="228" width="520" height="220" rx="16" fill="none" stroke="#3a6f56" stroke-dasharray="8 6"/>
    <text x="42" y="250" fill="#8fd0ab" font-weight="700">Local media pipeline</text>

    <rect x="572" y="228" width="302" height="220" rx="16" fill="none" stroke="#7a7a84" stroke-dasharray="8 6"/>
    <text x="588" y="250" fill="#c6c9d1" font-weight="700">External tools</text>
  </g>

  <g font-family="system-ui, -apple-system, monospace" font-size="13" fill="#d9e1f2" stroke="#2d3645" stroke-width="1">
    <rect x="58" y="78" width="188" height="58" rx="8" fill="#182433"/>
    <text x="72" y="103" fill="#f3f4f6" font-weight="700">ConverToe window</text>
    <text x="72" y="122" fill="#9aa3b2">CustomTkinter shell and controls</text>

    <rect x="286" y="78" width="188" height="58" rx="8" fill="#182433"/>
    <text x="300" y="103" fill="#f3f4f6" font-weight="700">Drag and drop</text>
    <text x="300" y="122" fill="#9aa3b2">TkinterDnD file intake</text>

    <rect x="514" y="78" width="188" height="58" rx="8" fill="#182433"/>
    <text x="528" y="103" fill="#f3f4f6" font-weight="700">State and status</text>
    <text x="528" y="122" fill="#9aa3b2">Queue-safe UI updates and progress</text>

    <rect x="94" y="300" width="190" height="64" rx="8" fill="#173024" stroke="#2f5a44"/>
    <text x="108" y="327" fill="#f3f4f6" font-weight="700">Source file</text>
    <text x="108" y="346" fill="#9aa3b2">Video or image selected by the user</text>

    <rect x="320" y="300" width="190" height="64" rx="8" fill="#173024" stroke="#2f5a44"/>
    <text x="334" y="327" fill="#f3f4f6" font-weight="700">Output file</text>
    <text x="334" y="346" fill="#9aa3b2">Written beside source or to chosen folder</text>

    <rect x="600" y="300" width="218" height="64" rx="8" fill="#25252b" stroke="#464651"/>
    <text x="614" y="327" fill="#f3f4f6" font-weight="700">FFmpeg / ffprobe</text>
    <text x="614" y="346" fill="#9aa3b2">External transcode and duration probing</text>

    <rect x="600" y="390" width="218" height="42" rx="8" fill="#25252b" stroke="#464651"/>
    <text x="614" y="416" fill="#f3f4f6" font-weight="700">Pillow</text>
    <text x="684" y="416" fill="#9aa3b2">Image conversion and PDF export</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)">
    <path d="M246 107 H286"/>
    <path d="M474 107 H514"/>
    <path d="M608 136 C608 188, 194 188, 194 300"/>
    <path d="M414 364 C414 404, 600 404, 600 331"/>
    <path d="M708 300 V272"/>
    <path d="M708 364 V390"/>
  </g>

  <g font-family="system-ui, -apple-system, monospace" font-size="12" fill="#9aa3b2" font-weight="700">
    <text x="260" y="96">Click / DnD</text>
    <text x="487" y="96">State</text>
    <text x="375" y="194">Read media</text>
    <text x="505" y="391">Save result</text>
    <text x="724" y="286">Transcode</text>
    <text x="724" y="382">Rasterize</text>
  </g>
</svg>